server:
  port: 8080 # 后端服务端口

spring:
  application:
    name: campus-backend

  # 数据库连接配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/campus_help?useUnicode=true&characterEncoding=utf-8&userSSL=false&serverTimezone=GMT%2B8
    username: root     # ⚠️ 改成你自己的数据库用户名
    password: junjulyaugust1021 # ⚠️ 改成你自己的数据库密码

# MyBatis 框架全局配置
mybatis:
  configuration:
    # 核心配置：开启下划线自动转驼峰命名规则（例如：database_field -> javaField）
    map-underscore-to-camel-case: true
    # 打印运行时的 SQL 日志，方便开发时在控制台调试
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    com.example.backend.mapper: debug # 打印 Mapper 级别的详细日志